<!DOCTYPE html><html lang='ru'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>База дизайн-мейкеров мира</title><style>
:root{--s0:#fafafa;--s1:#fff;--s2:#fff;--bd:#e6e6e6;--tx1:#1a1a1a;--tx2:#6b6b6b}
@media(prefers-color-scheme:dark){:root{--s0:#141414;--s1:#1c1c1c;--s2:#232323;--bd:#333;--tx1:#f0f0f0;--tx2:#9a9a9a}}
body{margin:0;padding:20px;background:var(--s0);color:var(--tx1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}

.wrap{max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.cd{border:1px solid var(--bd);border-radius:14px;overflow:hidden;background:var(--s1);display:flex;flex-direction:column}
.media{height:130px;background:var(--s0);display:flex;align-items:center;justify-content:center;overflow:hidden}
.ph{width:100%;height:100%;object-fit:cover;display:block}
.mono{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:44px;font-weight:600}
.body{padding:10px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.tp{font-size:11px;color:var(--tx2);text-transform:lowercase;display:flex;align-items:center;gap:5px}
.reg{width:9px;height:9px;border-radius:99px;display:inline-block}
.nm{font-weight:600;font-size:15px;line-height:1.2}
.mt{font-size:12.5px;color:var(--tx2)}
.ds{font-size:12px;color:var(--tx2);line-height:1.4}
.sp{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10.5px;padding:1px 7px;border-radius:99px;border:1px solid var(--bd);color:var(--tx2)}
.lk{display:flex;gap:6px;margin-top:auto;padding-top:4px}
.lk a{font-size:11px;text-decoration:none;padding:2px 9px;border-radius:99px;border:1px solid var(--bd);color:var(--tx2)}
.bar{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0;margin-bottom:12px;background:var(--s0)}
.bar input,.bar select{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--tx1)}
.bar input{flex:1;min-width:180px}
.cnt{font-size:12.5px;color:var(--tx2);margin-left:auto}
.head{margin-bottom:8px}
.h1{font-size:20px;font-weight:600}
.sub{font-size:13px;color:var(--tx2)}
.morewrap{text-align:center;margin:18px 0}
#more{font-size:13px;padding:8px 18px;border-radius:99px;border:1px solid var(--bd);background:var(--s2);color:var(--tx1);cursor:pointer}
</style></head><body>
<div class="wrap">
  <div class="head">
    <div class="h1">🏛 База дизайн-мейкеров мира</div>
    <div class="sub">1560 студий, агентств и авторов из 23 стран · поиск, фильтры, сортировка</div>
  </div>
  <div class="bar">
    <input id="q" placeholder="Поиск: имя, город, описание…">
    <select id="fc"></select>
    <select id="ft"></select>
    <select id="fr"></select>
    <select id="sort">
      <option value="name">Сортировка: имя</option>
      <option value="country">страна</option>
      <option value="reg">регалии ↓</option>
      <option value="year">год ↑</option>
      <option value="year_d">год ↓</option>
    </select>
    <span id="cnt" class="cnt"></span>
  </div>
  <div id="grid" class="grid"></div>
  <div class="morewrap"><button id="more">Показать ещё 60</button></div>
</div>
<script>const D=[];
const FLAG={"Россия":"🇷🇺","США":"🇺🇸","Великобритания":"🇬🇧","Швейцария":"🇨🇭","Нидерланды":"🇳🇱","Швеция":"🇸🇪","Германия":"🇩🇪","Япония":"🇯🇵","Франция":"🇫🇷","Италия":"🇮🇹","Дания":"🇩🇰","Испания":"🇪🇸","Норвегия":"🇳🇴","Финляндия":"🇫🇮","Польша":"🇵🇱","Канада":"🇨🇦","Австралия":"🇦🇺","Бразилия":"🇧🇷","Южная Корея":"🇰🇷","Корея":"🇰🇷","Китай":"🇨🇳","Мексика":"🇲🇽","Аргентина":"🇦🇷","Сингапур":"🇸🇬","Австрия":"🇦🇹","Перу":"🇵🇪","Польша ":"🇵🇱"};
const RC={"награды":"#d9a400","культовый":"#e5484d","спикер":"#3b82f6","преподаёт":"#12a150","автор книги":"#8b5cf6"};
const PAL=["#4f6bed","#12a150","#e5484d","#d9a400","#8b5cf6","#ec4899","#0891b2","#b45309"];
const RSCORE={"культовый":3,"автор книги":2,"преподаёт":1,"спикер":1,"награды":1};
const esc=s=>(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function fav(d){return d?("https://icons.duckduckgo.com/ip3/"+d+".ico"):"";}
function score(c){return (c.r||[]).reduce((a,r)=>a+(RSCORE[r]||0),0);}
function imgErr(el){const f=el.getAttribute("data-fav");if(f&&el.src!==f){el.src=f;return;}const m=document.createElement("div");m.className="mono";m.textContent=el.getAttribute("data-l");m.style.background=el.getAttribute("data-bg");el.replaceWith(m);}
window.imgErr=imgErr;

let SHOWN=60;
function apply(){
  const q=(document.getElementById("q").value||"").toLowerCase().trim();
  const fc=document.getElementById("fc").value, ft=document.getElementById("ft").value, fr=document.getElementById("fr").value, so=document.getElementById("sort").value;
  let a=D.filter(c=>{
    if(fc&&c.c!==fc)return false;
    if(ft&&c.t!==ft)return false;
    if(fr&&!(c.r||[]).includes(fr))return false;
    if(q){const hay=(c.n+" "+(c.city||"")+" "+(c.c||"")+" "+(c.d||"")).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  a.sort((x,y)=>{
    if(so==="country")return (x.c||"").localeCompare(y.c||"")||x.n.localeCompare(y.n);
    if(so==="year")return (x.y||9999)-(y.y||9999);
    if(so==="year_d")return (y.y||0)-(x.y||0);
    if(so==="reg")return score(y)-score(x)||x.n.localeCompare(y.n);
    return x.n.localeCompare(y.n);
  });
  document.getElementById("cnt").textContent=a.length+" из "+D.length;
  const grid=document.getElementById("grid");
  grid.innerHTML=a.slice(0,SHOWN).map(card).join("");
  document.getElementById("more").style.display=a.length>SHOWN?"inline-block":"none";
}
function card(c){
  const L=esc((c.n||"?").trim()[0]||"?").toUpperCase();
  const bg=PAL[hash(c.n)%PAL.length];
  const f=fav(c.dom);
  const first=c.img||f;
  const media=first?`<img class="ph" src="${esc(first)}" data-fav="${esc(f)}" data-l="${L}" data-bg="${bg}" loading="lazy" referrerpolicy="no-referrer" onerror="imgErr(this)">`:`<div class="mono" style="background:${bg}">${L}</div>`;
  const flag=FLAG[c.c]||"";
  const meta=[flag+" "+esc(c.c||""),esc(c.city||""),c.y?("· "+c.y):""].filter(Boolean).join(" ");
  const regs=(c.r||[]).map(r=>`<span class="reg" style="background:${RC[r]||"#888"}" title="${esc(r)}"></span>`).join("");
  const sp=(c.sp||[]).slice(0,3).map(s=>`<span class="chip">${esc(s)}</span>`).join("");
  const links=[c.site&&`<a href="${esc(c.site)}" target="_blank" rel="noopener">сайт</a>`,c.ig&&`<a href="${esc(c.ig)}" target="_blank" rel="noopener">IG</a>`,c.be&&`<a href="${esc(c.be)}" target="_blank" rel="noopener">Be</a>`].filter(Boolean).join("");
  return `<div class="cd">
    <div class="media">${media}</div>
    <div class="body">
      <div class="tp">${esc(c.t||"")} ${regs}</div>
      <div class="nm">${esc(c.n)}</div>
      <div class="mt">${meta}</div>
      ${c.d?`<div class="ds">${esc(c.d)}</div>`:""}
      <div class="sp">${sp}</div>
      <div class="lk">${links}</div>
    </div></div>`;
}
function init(){
  const cs=[...new Set(D.map(c=>c.c).filter(Boolean))].sort();
  const ts=[...new Set(D.map(c=>c.t).filter(Boolean))].sort();
  document.getElementById("fc").innerHTML='<option value="">Все страны</option>'+cs.map(c=>`<option>${esc(c)}</option>`).join("");
  document.getElementById("ft").innerHTML='<option value="">Все типы</option>'+ts.map(t=>`<option>${esc(t)}</option>`).join("");
  document.getElementById("fr").innerHTML='<option value="">Все регалии</option>'+["награды","культовый","спикер","преподаёт","автор книги"].map(r=>`<option>${esc(r)}</option>`).join("");
  ["q","fc","ft","fr","sort"].forEach(id=>document.getElementById(id).addEventListener("input",()=>{SHOWN=60;apply();}));
  document.getElementById("more").addEventListener("click",()=>{SHOWN+=60;apply();});
  apply();
}
init();
</script></body></html>
